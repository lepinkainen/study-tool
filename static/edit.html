<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Deck</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
<header>
  <a class="back" href="/">&larr; All Decks</a>
  <h1 id="deck-title">Edit Deck</h1>
  <a class="btn btn-primary btn-sm" id="study-link" href="#">Study</a>
</header>

<div class="container">
  <div class="panel">
    <h2>Add Card</h2>
    <div class="form-group">
      <textarea id="front" rows="2" placeholder="Question / word / term"></textarea>
    </div>
    <div class="form-group">
      <textarea id="back" rows="2" placeholder="Answer / translation / definition"></textarea>
    </div>
    <button class="btn btn-primary" id="add-btn">Add Card</button>
  </div>

  <div id="card-table-wrap" style="margin-top:1.5rem">
    <table id="card-table" style="display:none">
      <thead>
        <tr>
          <th>Question</th>
          <th>Answer</th>
          <th>State</th>
          <th>Reps</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="card-body"></tbody>
    </table>
    <div id="empty" class="empty" style="display:none">No cards yet. Add one above.</div>
  </div>
</div>

<div id="toast"></div>

<script>
const $ = id => document.getElementById(id);
const params = new URLSearchParams(location.search);
const deckID = params.get('deck');
if (!deckID) location.href = '/';

$('study-link').href = `/study.html?deck=${deckID}`;

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

async function api(method, path, body) {
  const res = await fetch(path, {
    method,
    headers: body ? {'Content-Type': 'application/json'} : {},
    body: body ? JSON.stringify(body) : undefined,
  });
  if (res.status === 204) return null;
  const json = await res.json();
  if (!res.ok) throw new Error(json.error || 'Request failed');
  return json;
}

async function loadDeck() {
  try {
    const res = await fetch(`/api/decks`);
    const decks = await res.json();
    const d = decks.find(x => String(x.id) === deckID);
    if (d) $('deck-title').textContent = d.name;
  } catch(_) {}
}

async function loadCards() {
  try {
    const cards = await api('GET', `/api/decks/${deckID}/cards`);
    renderCards(cards);
  } catch(e) { toast(e.message); }
}

function stateLabel(state) {
  const map = { new: 'New', learning: 'Learning', review: 'Review' };
  return `<span class="state-badge state-${state}">${map[state] || state}</span>`;
}

function renderCards(cards) {
  const tbody = $('card-body');
  const table = $('card-table');
  const empty = $('empty');

  if (!cards.length) {
    table.style.display = 'none';
    empty.style.display = '';
    return;
  }
  empty.style.display = 'none';
  table.style.display = '';

  tbody.innerHTML = cards.map(c => `
    <tr data-id="${c.id}">
      <td class="truncate">${esc(c.front)}</td>
      <td class="truncate">${esc(c.back)}</td>
      <td>${stateLabel(c.state)}</td>
      <td>${c.reps}</td>
      <td><button class="btn btn-outline btn-sm btn-danger del-btn" data-id="${c.id}">Delete</button></td>
    </tr>
  `).join('');

  tbody.querySelectorAll('.del-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      if (!confirm('Delete this card?')) return;
      try {
        await api('DELETE', `/api/cards/${btn.dataset.id}`);
        loadCards();
      } catch(e) { toast(e.message); }
    });
  });
}

$('add-btn').addEventListener('click', async () => {
  const front = $('front').value.trim();
  const back  = $('back').value.trim();
  if (!front || !back) { toast('Both fields are required'); return; }
  try {
    await api('POST', `/api/decks/${deckID}/cards`, { front, back });
    $('front').value = '';
    $('back').value = '';
    $('front').focus();
    loadCards();
  } catch(e) { toast(e.message); }
});

// Ctrl+Enter submits
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') $('add-btn').click();
});

loadDeck();
loadCards();
</script>
</body>
</html>
