<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
<header>
  <a class="back" href="/">&larr; All Decks</a>
  <h1 id="deck-title">Study</h1>
</header>

<div class="container">
  <!-- Study UI -->
  <div id="study-ui" class="study-wrap" style="display:none">
    <div class="study-progress" id="progress"></div>

    <div class="card-scene">
      <div class="card-inner" id="card-inner">
        <div class="card-face front">
          <div class="card-text" id="front-text"></div>
        </div>
        <div class="card-face back">
          <div class="card-text" id="back-text"></div>
        </div>
      </div>
    </div>

    <div class="study-controls">
      <button class="btn btn-primary btn-full" id="show-btn">Show Answer</button>
      <div class="rating-buttons" id="rating-btns" style="display:none">
        <button class="btn btn-again" data-rating="0">Again</button>
        <button class="btn btn-hard"  data-rating="1">Hard</button>
        <button class="btn btn-good"  data-rating="2">Good</button>
        <button class="btn btn-easy"  data-rating="3">Easy</button>
      </div>
    </div>
  </div>

  <!-- Done screen -->
  <div id="done-screen" class="done-screen" style="display:none">
    <h2>All caught up!</h2>
    <p>No cards due right now. Come back later.</p>
    <div style="display:flex;gap:0.75rem;justify-content:center">
      <a class="btn btn-primary" href="/">All Decks</a>
      <a class="btn btn-outline" id="edit-link" href="#">Add Cards</a>
    </div>
  </div>

  <!-- Loading -->
  <div id="loading" class="empty">Loading…</div>
</div>

<div id="toast"></div>

<script>
const $ = id => document.getElementById(id);
const params = new URLSearchParams(location.search);
const deckID = params.get('deck');
if (!deckID) location.href = '/';

$('edit-link').href = `/edit.html?deck=${deckID}`;

let currentCard = null;
let dueCount = 0;

function toast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

async function api(method, path, body) {
  const res = await fetch(path, {
    method,
    headers: body ? {'Content-Type': 'application/json'} : {},
    body: body ? JSON.stringify(body) : undefined,
  });
  if (res.status === 204) return null;
  const json = await res.json();
  if (!res.ok) throw new Error(json.error || 'Request failed');
  return json;
}

async function loadDeckName() {
  try {
    const decks = await api('GET', '/api/decks');
    const d = decks.find(x => String(x.id) === deckID);
    if (d) {
      $('deck-title').textContent = d.name;
      dueCount = d.due_cards + (d.due_cards === 0 ? 0 : 0); // will be updated per-fetch
    }
  } catch(_) {}
}

function showCard(card) {
  currentCard = card;
  $('front-text').textContent = card.front;
  $('back-text').textContent  = card.back;

  const inner = $('card-inner');
  inner.classList.remove('flipped');

  $('show-btn').style.display = '';
  $('rating-btns').style.display = 'none';

  $('loading').style.display = 'none';
  $('done-screen').style.display = 'none';
  $('study-ui').style.display = 'flex';
}

function showDone() {
  $('loading').style.display = 'none';
  $('study-ui').style.display = 'none';
  $('done-screen').style.display = '';
}

async function fetchNext() {
  $('study-ui').style.display = 'none';
  $('done-screen').style.display = 'none';
  $('loading').style.display = '';
  try {
    const data = await api('GET', `/api/decks/${deckID}/study`);
    if (data.done) {
      showDone();
    } else {
      // Refresh due count from deck list
      const decks = await api('GET', '/api/decks');
      const d = decks.find(x => String(x.id) === deckID);
      if (d) {
        dueCount = d.due_cards;
        $('progress').textContent = d.due_cards > 0
          ? `${d.due_cards} card${d.due_cards !== 1 ? 's' : ''} remaining`
          : 'Last card';
      }
      showCard(data);
    }
  } catch(e) {
    $('loading').style.display = 'none';
    toast(e.message);
  }
}

$('show-btn').addEventListener('click', () => {
  $('card-inner').classList.add('flipped');
  $('show-btn').style.display = 'none';
  $('rating-btns').style.display = 'flex';
});

$('rating-btns').querySelectorAll('[data-rating]').forEach(btn => {
  btn.addEventListener('click', async () => {
    if (!currentCard) return;
    const rating = parseInt(btn.dataset.rating, 10);
    try {
      await api('POST', `/api/cards/${currentCard.id}/review`, { rating });
    } catch(e) { toast(e.message); }
    fetchNext();
  });
});

// Keyboard shortcuts: 1-4 for ratings, Space to show answer
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === ' ' || e.key === 'Enter') {
    if ($('show-btn').style.display !== 'none') $('show-btn').click();
    e.preventDefault();
  }
  const ratingMap = { '1': '0', '2': '1', '3': '2', '4': '3' };
  if (ratingMap[e.key] && $('rating-btns').style.display !== 'none') {
    document.querySelector(`[data-rating="${ratingMap[e.key]}"]`)?.click();
  }
});

loadDeckName();
fetchNext();
</script>
</body>
</html>
