<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flashcards</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
<header>
  <h1>Flashcards</h1>
</header>

<div class="container">
  <details class="panel new-deck-panel">
    <summary>New Deck</summary>
    <div class="form-row" style="margin-top:1rem">
      <div class="form-group">
        <label for="deck-name">Name</label>
        <input id="deck-name" type="text" placeholder="e.g. Japanese N5" autocomplete="off">
      </div>
      <div class="form-group">
        <label for="deck-desc">Description (optional)</label>
        <input id="deck-desc" type="text" placeholder="e.g. Basic vocabulary">
      </div>
      <button class="btn btn-primary" id="create-deck-btn">Create</button>
    </div>
  </details>

  <div id="deck-list" class="deck-grid"></div>
  <div id="empty" class="empty" style="display:none">
    <p>No decks yet. Create one above to get started.</p>
  </div>
</div>

<div id="toast"></div>

<script>
const $ = id => document.getElementById(id);

function toast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

async function api(method, path, body) {
  const res = await fetch(path, {
    method,
    headers: body ? {'Content-Type': 'application/json'} : {},
    body: body ? JSON.stringify(body) : undefined,
  });
  if (res.status === 204) return null;
  const json = await res.json();
  if (!res.ok) throw new Error(json.error || 'Request failed');
  return json;
}

function stateBadge(n, label) {
  return `<span class="badge ${n === 0 ? 'zero' : ''}">${n} ${label}</span>`;
}

function renderDecks(decks) {
  const list = $('deck-list');
  const empty = $('empty');

  if (!decks.length) {
    list.innerHTML = '';
    empty.style.display = '';
    return;
  }
  empty.style.display = 'none';

  list.innerHTML = decks.map(d => `
    <div class="deck-card" data-id="${d.id}">
      <h2>${esc(d.name)}</h2>
      <p>${esc(d.description || '')}</p>
      <div class="deck-meta">
        ${stateBadge(d.due_cards, 'due')}
        <span>${d.total_cards} card${d.total_cards !== 1 ? 's' : ''}</span>
      </div>
      <div class="deck-actions">
        <a class="btn btn-primary btn-sm" href="/study.html?deck=${d.id}">Study</a>
        <a class="btn btn-outline btn-sm" href="/edit.html?deck=${d.id}">Edit</a>
        <button class="deck-delete-link delete-btn" data-id="${d.id}" style="margin-left:auto">delete</button>
      </div>
    </div>
  `).join('');

  list.querySelectorAll('.delete-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      if (!confirm('Delete this deck and all its cards?')) return;
      try {
        await api('DELETE', `/api/decks/${btn.dataset.id}`);
        loadDecks();
      } catch(e) { toast(e.message); }
    });
  });
}

async function loadDecks() {
  try {
    const decks = await api('GET', '/api/decks');
    renderDecks(decks);
  } catch(e) { toast(e.message); }
}

$('create-deck-btn').addEventListener('click', async () => {
  const name = $('deck-name').value.trim();
  if (!name) { toast('Name is required'); return; }
  try {
    await api('POST', '/api/decks', { name, description: $('deck-desc').value.trim() });
    $('deck-name').value = '';
    $('deck-desc').value = '';
    loadDecks();
  } catch(e) { toast(e.message); }
});

$('deck-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') $('create-deck-btn').click();
});

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

loadDecks();
</script>
</body>
</html>
